name: Trace
options:
  bundleIdPrefix: com.colecantcode
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: true
    # Bump MARKETING_VERSION on EVERY TestFlight build (CI sets the build number to the
    # GitHub run number at archive time).
    MARKETING_VERSION: "1.0.3"
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: B3DB33R8JN

targets:
  Trace:
    type: application
    platform: iOS
    sources:
      - Trace/Sources
      - Trace/Assets.xcassets
      - path: Trace/PrivacyInfo.xcprivacy
        type: file
    # Sign in with Apple (optional account upgrade for the leaderboard).
    entitlements:
      path: Trace/Trace.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colecantcode.trace
        INFOPLIST_KEY_CFBundleDisplayName: Trace
        INFOPLIST_KEY_CFBundleName: Trace
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        PRODUCT_NAME: Trace
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_MODULE_NAME: Trace
        CODE_SIGN_IDENTITY: "Apple Development"
    scheme:
      testTargets:
        - TraceTests

  TraceTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Trace/Tests
    dependencies:
      - target: Trace
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colecantcode.trace.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Trace.app/Trace"
